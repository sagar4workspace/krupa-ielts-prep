    <textarea id="wta_${i}" rows="9" placeholder="Write your response here…" oninput="updWC(this,${ex.minWords},'wc_${i}')"></textarea>
    <div class="wcnt" id="wc_${i}">0 / ${ex.minWords} words minimum</div>
    <div class="brow">
      <button class="btn btn-t" onclick="scoreWrite(${i})">📊 Score My Writing</button>
      <button class="btn btn-g" onclick="document.getElementById('wta_${i}').value='';document.getElementById('wc_${i}').textContent='0 / ${ex.minWords} words minimum'">Clear</button>
    </div>
    <div id="wres_${i}"></div>
  </div>`;
}

function updWC(el,min,id){
  const w=el.value.trim()?el.value.trim().split(/\s+/).length:0;
  const d=document.getElementById(id);
  d.textContent=`${w} / ${min} words minimum`;
  d.style.color=w>=min?'var(--green)':'var(--red)';
}

function scoreWrite(i){
  const ex=WRITING[i];
  const txt=document.getElementById(`wta_${i}`).value.trim();
  if(!txt||txt.split(/\s+/).length<30){alert('Please write more before scoring.');return;}
  const w=txt.split(/\s+/).length;
  const hasLink=/however|furthermore|moreover|although|therefore|consequently|in addition|on the other hand|nevertheless/i.test(txt);
  const hasEg=/for example|for instance|such as|notably|in particular|to illustrate/i.test(txt);
  const hasOpin=/i believe|i think|in my opinion|i would argue|it seems|i feel|my view/i.test(txt);
  const hasCon=/in conclusion|to conclude|in summary|overall|to sum up/i.test(txt);
  const isT2=ex.type==='Task 2';
  const minW=ex.minWords;

  let ta=6; if(w>=minW+50)ta=7; if(w<minW)ta=5; if(isT2&&!hasOpin)ta=Math.max(ta-0.5,4);
  let cc=6; if(hasLink)cc=7; if(hasCon)cc+=0.5; cc=Math.min(cc,8);
  let lr=6; if(w>minW*1.15)lr=7; if(avgWrdLen(txt)>5.5)lr=Math.min(lr+0.5,8);
  let gr=6; const sents=txt.split(/[.!?]+/).filter(s=>s.trim().length>5); if(sents.length>6)gr=7;
  const overall=Math.round(((ta+cc+lr+gr)/4)*2)/2;
  const cls=overall>=7?'good':overall>=5.5?'mid':'low';
  const wWarn=w<minW?`<div class="fb fbb">⚠️ Under word count: ${w} words. Need at least ${minW}. This lowers your Task Achievement score.</div>`:'';

  document.getElementById(`wres_${i}`).innerHTML=`
    <div class="rbox ${cls}">
      <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
        <div><div class="sbig">${overall}</div><div class="slbl">Overall Band</div></div>
        <div style="font-size:0.83rem;line-height:1.6;max-width:380px;color:var(--muted)">Based on your text structure, vocabulary, and argument development.</div>
      </div>
      ${wWarn}
      <table class="btbl">
        <thead><tr><th>Criterion</th><th>Band</th><th>Feedback</th></tr></thead>
        <tbody>
          <tr><td><strong>${isT2?'Task Response':'Task Achievement'}</strong></td><td><strong>${ta}</strong></td><td>${w>=minW?'Word count met.':' Under word count — develop your points more.'} ${isT2&&!hasOpin?'Include a clear personal opinion.':''}</td></tr>
          <tr><td><strong>Coherence & Cohesion</strong></td><td><strong>${cc}</strong></td><td>${hasLink?'Good use of linking words detected.':'Add linking words: however, furthermore, moreover, consequently...'} ${hasCon?'Conclusion present.':'Add a clear conclusion paragraph.'}</td></tr>
          <tr><td><strong>Lexical Resource</strong></td><td><strong>${lr}</strong></td><td>${lr>=7?'Good range of vocabulary evident.':'Try using more varied and precise vocabulary. Avoid repeating the same words.'}</td></tr>
          <tr><td><strong>Grammar</strong></td><td><strong>${gr}</strong></td><td>${sents.length>6?'Good sentence variety.':'Try mixing simple and complex sentences for a better score.'}</td></tr>
        </tbody>
      </table>
      <div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <div style="font-size:0.7rem;color:var(--green);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px">✅ Positives</div>
          <div class="fb fbg">${hasLink?'✅ Linking/cohesive language used':'⚠️ Add more linking words'}</div>
          <div class="fb fbg">${w>=minW?'✅ Word count requirement met':'⚠️ Reach the minimum word count'}</div>
          ${hasEg?`<div class="fb fbg">✅ Examples used to support points</div>`:''}
        </div>
        <div>
          <div style="font-size:0.7rem;color:var(--red);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px">📌 To Improve</div>
          ${!hasLink?`<div class="fb fbb">Add: however, furthermore, consequently, in addition</div>`:''}
          ${!hasEg?`<div class="fb fbb">Include specific examples to support each point</div>`:''}
          ${isT2&&!hasOpin?`<div class="fb fbb">State your opinion clearly: 'I believe...', 'In my view...'</div>`:''}
          ${!hasCon?`<div class="fb fbb">Add a conclusion: 'In conclusion, ...'</div>`:''}
        </div>
      </div>
    </div>`;
  if(!state.w.done.includes(i)){state.w.done.push(i);save();updateBadges();}
}

function avgWrdLen(t){
  const ws=t.trim().split(/\s+/);
  return ws.reduce((a,w)=>a+w.replace(/[^a-z]/gi,'').length,0)/ws.length;
}

    <div id="lres_${i}"></div>

function checkListen(i){
  const ex=LISTENING[i];
  let correct=0;
  ex.questions.forEach((q,qi)=>{
    const inp=document.getElementById(`lsa_${i}_${qi}`);
    const user=(inp?inp.value.toLowerCase().trim():'');
    const ans=q.answer.toLowerCase().split('/').map(a=>a.trim());
    const ok=ans.some(a=>user===a||(user.length>1&&a.replace(/[^a-z0-9]/g,'').includes(user.replace(/[^a-z0-9]/g,''))));
    if(inp){inp.classList.add(ok?'cok':'cno');if(!ok)inp.placeholder='Expected: '+q.answer;}
    if(ok) correct++;
  });
  const pct=Math.round(correct/ex.questions.length*100);
  const band=pct>=90?9:pct>=80?8:pct>=70?7:pct>=60?6:pct>=50?5:4;
  const cls=band>=7?'good':band>=5?'mid':'low';
  document.getElementById(`lres_${i}`).innerHTML=`
    <div class="rbox ${cls}">
      <div style="display:flex;gap:22px;align-items:center;flex-wrap:wrap">
        <div><div class="sbig">${correct}/${ex.questions.length}</div><div class="slbl">Correct</div></div>
        <div><div class="sbig">Band ${band}</div><div class="slbl">Estimated</div></div>
      </div>
      <p style="margin-top:10px;font-size:0.83rem;color:var(--muted)">${band>=7?'🎉 Excellent listening!':band>=5?'👍 Good — check transcript for missed answers.':'📻 Try again — listen once more before checking transcript.'}</p>
    </div>`;
  if(!state.l.done.includes(i)){state.l.done.push(i);save();updateBadges();}
}

// TTS
// ══════════════════════════════════════
function togTTS(i){
  const ex=LISTENING[curEx.l];
  if(ttsPlay){stopTTS();}else{startTTS(i,ex.text);}
}
function chgSpd(i){if(ttsPlay){const ex=LISTENING[curEx.l];stopTTS();setTimeout(()=>startTTS(i,ex.text),100);}}
function startTTS(i,text){
  if(!window.speechSynthesis){alert('Text-to-speech not supported. Try Chrome or Edge.');return;}
  stopTTS();
  ttsTxt=text;
  ttsUtt=new SpeechSynthesisUtterance(text);
  const spd=parseFloat(document.getElementById('spd_'+i)?.value||1);
  ttsUtt.rate=spd;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(v=>v.lang.startsWith('en-GB'))||vs.find(v=>v.lang.startsWith('en-AU'))||vs.find(v=>v.lang.startsWith('en'));
  if(v) ttsUtt.voice=v;
  ttsUtt.onstart=()=>{
    ttsPlay=true;
    const b=document.getElementById('pb_'+i);if(b)b.textContent='⏸';
    const s=document.getElementById('tst_'+i);if(s)s.textContent='Playing…';
    startProg(i,text,spd);
  };
  ttsUtt.onend=()=>{
    ttsPlay=false;
    const b=document.getElementById('pb_'+i);if(b)b.textContent='▶';
    const s=document.getElementById('tst_'+i);if(s)s.textContent='Finished';
    const p=document.getElementById('prgf_'+i);if(p)p.style.width='100%';
    clearInterval(progIv);
  };
  ttsUtt.onerror=()=>{ttsPlay=false;clearInterval(progIv);};
  window.speechSynthesis.speak(ttsUtt);
}
function startProg(i,text,spd){
  clearInterval(progIv);
  let pct=0;
  const tot=text.split(/\s+/).length/(2.5*spd);
  progIv=setInterval(()=>{
    if(!ttsPlay){clearInterval(progIv);return;}
    pct=Math.min(pct+(100/(tot*10)),98);
    const p=document.getElementById('prgf_'+i);if(p)p.style.width=pct+'%';
  },100);
}
function stopTTS(){
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  ttsPlay=false;clearInterval(progIv);
}

// ── AUTH LOGIC ──
function doLogin(){
  const un = (document.getElementById('li_user').value||'').trim();
  const pw = document.getElementById('li_pass').value||'';
  if(!un||!pw){ showLogin('⚠️ Please enter both username and password.'); return; }

  // Master user check
  if(un.toLowerCase()==='dreamcatcher'){
    if(pw===MASTER.password){
      loginSuccess({username:MASTER.username,name:MASTER.name,email:'krupa@ielts.com',role:'admin'});
    } else {
      showLogin('❌ Incorrect password. Please try again.');
    }
    return;
  }

  // Regular user check
  const user = findUser(un);
  if(!user){ showLogin(`❌ Username "${un}" not found. Please register first.`); return; }
  if(!user.verified){ showLogin('❌ Account not verified. Please complete email verification.'); return; }
  if(user.password !== btoa(pw)){ showLogin('❌ Incorrect password. Please try again.'); return; }
  loginSuccess(user);
}

function doRegister(){
  const name=(document.getElementById('rg_name').value||'').trim();
  const email=(document.getElementById('rg_email').value||'').trim();
  const un=(document.getElementById('rg_user').value||'').trim().toLowerCase();
  const pw=document.getElementById('rg_pass').value||'';
  const pw2=document.getElementById('rg_pass2').value||'';
  const pf={name,email,username:un};

  if(!name||!email||!un||!pw){ showRegister('⚠️ All fields are required.',pf); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ showRegister('⚠️ Please enter a valid email address.',pf); return; }
  if(un.length<3){ showRegister('⚠️ Username must be at least 3 characters.',pf); return; }
  if(/\s/.test(un)){ showRegister('⚠️ Username cannot contain spaces.',pf); return; }
  if(un==='dreamcatcher'){ showRegister('⚠️ That username is reserved. Please choose another.',pf); return; }
  if(pw.length<6){ showRegister('⚠️ Password must be at least 6 characters.',pf); return; }
  if(pw!==pw2){ showRegister('⚠️ Passwords do not match.',pf); return; }
  if(findUser(un)){ showRegister(`⚠️ Username "${un}" is already taken. Try another.`,pf); return; }

  const userData={name,email,username:un,password:btoa(pw),verified:false,joined:new Date().toISOString()};
  showVerify(userData);
}

function doVerify(){
  const entered=(document.getElementById('otp_inp').value||'').trim();
  const realOtp=localStorage.getItem('krupa_pending_otp');
  const userData=JSON.parse(localStorage.getItem('krupa_pending_user')||'{}');
  if(entered!==realOtp){
    document.querySelector('.auth-msg').className='auth-msg err';
    document.querySelector('.auth-msg').textContent='❌ Incorrect code. Please try again.';
    return;
  }
  userData.verified=true;
  const users=getUsers();
  users.push(userData);
  saveUsers(users);
  localStorage.removeItem('krupa_pending_otp');
  localStorage.removeItem('krupa_pending_user');
  showLogin(`✅ Account verified! Welcome, ${userData.name}. Please sign in.`);
}

function doForgot(){
  const email=(document.getElementById('fp_email').value||'').trim();
  const users=getUsers();
  const user=users.find(u=>u.email.toLowerCase()===email.toLowerCase());

  const otp=Math.floor(100000+Math.random()*900000).toString();
  localStorage.setItem('krupa_pending_otp',otp);
  localStorage.setItem('krupa_reset_user',user.username);
  document.getElementById('authWrap').innerHTML=`

    </div>

      <div style="font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;color:var(--teal);letter-spacing:8px">${otp}</div>
    </div>
    <div class="auth-field"><label>Enter Code</label><input type="text" id="rst_otp" placeholder="6-digit code" maxlength="6" style="text-align:center;letter-spacing:6px;font-size:1.2rem"/></div>
    <div class="auth-field"><label>New Password</label><div style="position:relative"><input type="password" id="rst_pw" placeholder="New password"/><span class="eye-btn" onclick="togglePwd('rst_pw',this)">👁</span></div></div>
    <div class="auth-field"><label>Confirm Password</label><div style="position:relative"><input type="password" id="rst_pw2" placeholder="Confirm password" onkeydown="if(event.key==='Enter')doReset()"/><span class="eye-btn" onclick="togglePwd('rst_pw2',this)">👁</span></div></div>
    <button class="auth-btn" onclick="doReset()">Reset Password →</button>
  </div>`;
}

function doReset(){
  const otp=(document.getElementById('rst_otp').value||'').trim();
  const pw=document.getElementById('rst_pw').value||'';
  const pw2=document.getElementById('rst_pw2').value||'';
  const realOtp=localStorage.getItem('krupa_pending_otp');
  const un=localStorage.getItem('krupa_reset_user');
  if(otp!==realOtp){alert('Incorrect code.');return;}
  if(pw.length<6){alert('Password must be at least 6 characters.');return;}
  if(pw!==pw2){alert('Passwords do not match.');return;}
  const users=getUsers();
  const idx=users.findIndex(u=>u.username===un);
  if(idx>-1){ users[idx].password=btoa(pw); saveUsers(users); }
  localStorage.removeItem('krupa_pending_otp');
  localStorage.removeItem('krupa_reset_user');
  showLogin('✅ Password reset successfully! Please sign in with your new password.');
}

function loginSuccess(user){
  currentUser=user;
  localStorage.setItem('krupa_session',JSON.stringify(user));
  document.getElementById('authWrap').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  uLoad();
  // Set username in header
  document.getElementById('userChip').innerHTML=`
    <span style="font-size:0.78rem;color:var(--muted)">👤</span>
    <span style="font-size:0.82rem;font-weight:600;color:var(--teal)">${user.name||user.username}</span>
    ${user.role==='admin'?'<span style="font-size:0.6rem;background:var(--amber);color:#000;padding:1px 6px;border-radius:8px;font-weight:700;margin-left:3px">ADMIN</span>':''}
    <button onclick="doLogout()" style="background:none;border:1px solid var(--border);color:var(--muted);padding:3px 8px;border-radius:5px;cursor:pointer;font-size:0.7rem;margin-left:6px;font-family:inherit">Sign Out</button>`;
  if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();window.speechSynthesis.getVoices();}
  updateBadges();
  renderHome();
}

function doLogout(){
  stopTTS();
  currentUser=null;
  state={r:{done:[]},w:{done:[]},l:{done:[]}};
  localStorage.removeItem('krupa_session');
  document.getElementById('app').classList.add('hidden');
  showLogin();
}

function togglePwd(id,btn){
  const el=document.getElementById(id);
  if(el.type==='password'){el.type='text';btn.textContent='🙈';}
  else{el.type='password';btn.textContent='👁';}
}

// ── BOOT ──
(function boot(){
  // Check for existing session
  try{
    const sess=localStorage.getItem('krupa_session');
    if(sess){
      const user=JSON.parse(sess);
      if(user&&user.username){
        loginSuccess(user);
        return;
      }
    }
  }catch(e){}
  showLogin();
})();
