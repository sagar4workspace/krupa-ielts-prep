<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KRUPA IELTS PREP</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2230;--border:#30363d;--teal:#00d4aa;--teal-dim:#00b891;--amber:#f0a500;--red:#f85149;--green:#3fb950;--text:#e6edf3;--muted:#7d8590;--reading:#58a6ff;--writing:#f0a500;--listening:#bc8cff;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
/* ── AUTH ── */
#authWrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);
  background-image:radial-gradient(ellipse at 20% 50%,rgba(0,212,170,0.07) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(88,166,255,0.06) 0%,transparent 60%);
  padding:24px;
}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,0.5);animation:fu .4s ease both;}
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:700;color:var(--teal);text-align:center;margin-bottom:6px;}
.auth-logo em{color:var(--text);font-style:normal;}
.auth-sub{text-align:center;color:var(--muted);font-size:0.85rem;margin-bottom:24px;}
.auth-field{margin-bottom:16px;}
.auth-field label{display:block;font-size:0.78rem;font-weight:600;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px;}
.auth-field input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;transition:border .13s;}
.auth-field input:focus{outline:none;border-color:var(--teal);}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:0.9rem;user-select:none;opacity:0.6;}
.eye-btn:hover{opacity:1;}
.auth-btn{width:100%;padding:12px;background:var(--teal);color:#000;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:8px;transition:all .17s;}
.auth-btn:hover{background:var(--teal-dim);transform:translateY(-1px);}
.auth-btn-ghost{width:100%;padding:11px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all .17s;}
.auth-btn-ghost:hover{border-color:var(--teal);color:var(--teal);}
.auth-divider{text-align:center;color:var(--muted);font-size:0.78rem;margin:16px 0 10px;}
.auth-msg{padding:10px 14px;border-radius:8px;font-size:0.83rem;margin-bottom:16px;text-align:center;line-height:1.5;}
.auth-msg.err{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:#f85149;}
.auth-msg.ok{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green);}
#userChip{display:flex;align-items:center;gap:6px;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:700;color:var(--teal);cursor:pointer;}
.logo em{color:var(--text);font-style:normal;}
.date-pill{font-size:0.72rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 20px;overflow-x:auto;}
.ntab{padding:13px 18px;color:var(--muted);font-size:0.78rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.ntab:hover{color:var(--text);}
.ntab.active{color:var(--teal);border-bottom-color:var(--teal);}
.nbadge{background:var(--teal);color:#000;font-size:0.62rem;font-weight:700;padding:2px 6px;border-radius:10px;margin-left:4px;}
main{max-width:1000px;margin:0 auto;padding:28px 18px;}
/* HOME */
.hero{text-align:center;padding:36px 0 24px;animation:fu .5s ease both;}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:700;line-height:1.1;}
.hero h1 span{color:var(--teal);}
.hero p{color:var(--muted);margin-top:10px;font-size:0.95rem;max-width:460px;margin-inline:auto;line-height:1.7;}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin:28px 0;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;animation:fu .5s ease both;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ac);border-radius:14px 14px 0 0;}
.scard:hover{transform:translateY(-4px);border-color:var(--ac);box-shadow:0 10px 36px rgba(0,0,0,.4);}
.scard .si{font-size:1.8rem;margin-bottom:12px;}
.scard h3{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;margin-bottom:6px;}
.scard p{font-size:0.8rem;color:var(--muted);line-height:1.55;}
.pbar-wrap{margin-top:16px;}
.pbar-num{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;}
.pbar-lbl{font-size:0.68rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.pbar-thin{height:4px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:2px;background:var(--ac);transition:width .6s ease;}
/* SECTION */
.sec-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.sec-hdr h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;}
.sec-hdr p{color:var(--muted);font-size:0.82rem;margin-top:4px;}
.tp-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;text-align:right;min-width:120px;}
.tp-big{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--teal);}
.tp-lbl{font-size:0.67rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
/* EXERCISE GRID */
.egrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:24px;}
.ecard{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s;}
.ecard:hover{transform:translateY(-2px);border-color:var(--ac);}
.ecard.done{border-color:var(--green);background:rgba(63,185,80,.07);}
.ecard.acard{border-color:var(--teal);background:rgba(0,212,170,.07);}
.ecard .en{font-size:1.05rem;font-weight:700;font-family:'Cormorant Garamond',serif;}
.ecard .es{font-size:0.6rem;margin-top:3px;text-transform:uppercase;letter-spacing:.7px;font-weight:600;color:var(--muted);}
.ecard.done .en{color:var(--green);}
.ecard.done .es{color:var(--green);}
.ecard.done::after{content:'✓';position:absolute;top:4px;right:6px;font-size:.7rem;color:var(--green);font-weight:700;}
.ecard{position:relative;}
/* PANEL */
.epanel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;animation:fu .3s ease both;}
.ptop{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.ptop h3{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;}
.tag{font-size:0.67rem;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;}
.tag-r{background:rgba(88,166,255,.15);color:var(--reading);border:1px solid rgba(88,166,255,.3);}
.tag-w{background:rgba(240,165,0,.15);color:var(--amber);border:1px solid rgba(240,165,0,.3);}
.tag-l{background:rgba(188,140,255,.15);color:var(--listening);border:1px solid rgba(188,140,255,.3);}
/* PASSAGE */
.passage{background:var(--bg);border-left:3px solid var(--ac);padding:18px 22px;border-radius:0 9px 9px 0;font-size:0.9rem;line-height:1.85;color:#cdd9e5;margin-bottom:20px;max-height:320px;overflow-y:auto;}
.passage::-webkit-scrollbar{width:4px;}
.passage::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
/* QUESTIONS */
.qb{margin-bottom:20px;}
.ql{font-weight:600;font-size:0.87rem;margin-bottom:9px;display:flex;align-items:flex-start;gap:7px;}
.qn{display:inline-flex;align-items:center;justify-content:center;background:var(--ac);color:#000;width:20px;height:20px;min-width:20px;border-radius:50%;font-size:0.65rem;font-weight:700;margin-top:1px;}
.opts{display:flex;flex-direction:column;gap:6px;margin-top:7px;}
.opt{display:flex;align-items:center;gap:9px;padding:9px 12px;border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:0.84rem;transition:all .12s;color:var(--text);user-select:none;}
.opt:hover{border-color:var(--ac);background:rgba(255,255,255,.03);}
.opt.sel{border-color:var(--reading);background:rgba(88,166,255,.08);}
.opt.correct{border-color:var(--green)!important;background:rgba(63,185,80,.1)!important;color:var(--green);}
.opt.wrong{border-color:var(--red)!important;background:rgba(248,81,73,.08)!important;color:var(--red);}
.ainp{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;margin-top:7px;transition:border .12s;}
.ainp:focus{outline:none;border-color:var(--ac);}
.ainp.cok{border-color:var(--green)!important;}
.ainp.cno{border-color:var(--red)!important;}
/* BUTTONS */
.btn{padding:10px 22px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:0.83rem;font-weight:600;cursor:pointer;border:none;transition:all .17s;}
.btn-t{background:var(--teal);color:#000;}
.btn-t:hover{background:var(--teal-dim);transform:translateY(-1px);}
.btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-g:hover{border-color:var(--text);color:var(--text);}
.brow{display:flex;gap:9px;flex-wrap:wrap;margin-top:20px;}
/* RESULT */
.rbox{margin-top:18px;padding:20px;border-radius:11px;border:1px solid;animation:fu .3s ease both;}
.rbox.good{border-color:var(--green);background:rgba(63,185,80,.07);}
.rbox.mid{border-color:var(--amber);background:rgba(240,165,0,.07);}
.rbox.low{border-color:var(--red);background:rgba(248,81,73,.07);}
.sbig{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;line-height:1;}
.slbl{font-size:0.68rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}
/* WRITING */
textarea{width:100%;padding:13px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;line-height:1.7;resize:vertical;min-height:180px;transition:border .12s;}
textarea:focus{outline:none;border-color:var(--amber);}
.wcnt{font-size:0.75rem;color:var(--muted);margin-top:5px;text-align:right;}
.btbl{width:100%;border-collapse:collapse;font-size:0.82rem;margin-top:12px;}
.btbl th{background:var(--surface2);color:var(--teal);padding:9px 12px;text-align:left;border-bottom:1px solid var(--border);}
.btbl td{padding:9px 12px;border-bottom:1px solid var(--border);}
/* LISTENING */
.ttsbar{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);padding:14px 18px;border-radius:11px;margin-bottom:16px;}
.pbtn{width:44px;height:44px;border-radius:50%;background:var(--listening);color:#000;border:none;cursor:pointer;font-size:1rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .14s;}
.pbtn:hover{background:#a06de0;}
.tinfo{flex:1;}
.ttl{font-weight:600;font-size:0.88rem;}
.tsub{font-size:0.72rem;color:var(--muted);margin-top:2px;}
.prgb{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.prgf{height:100%;background:var(--listening);width:0%;transition:width .3s;border-radius:2px;}
.ssel{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:0.75rem;cursor:pointer;}
.trbtn{font-size:0.75rem;color:var(--muted);cursor:pointer;padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:none;font-family:'DM Sans',sans-serif;transition:all .12s;margin-bottom:12px;}
.trbtn:hover{border-color:var(--text);color:var(--text);}
/* WRITING FEEDBACK */
.fb{padding:9px 12px;border-radius:7px;font-size:0.82rem;line-height:1.55;margin-bottom:7px;}
.fbg{background:rgba(63,185,80,.1);border-left:3px solid var(--green);}
.fbw{background:rgba(240,165,0,.1);border-left:3px solid var(--amber);}
.fbb{background:rgba(248,81,73,.1);border-left:3px solid var(--red);}
.hidden{display:none!important;}
@media(max-width:640px){.sgrid{grid-template-columns:1fr;}.egrid{grid-template-columns:repeat(4,1fr);}.hero h1{font-size:2rem;}.epanel{padding:16px;}}
</style>
</head>
<body>
<div id="authWrap" class="hidden"></div>
<div id="app" class="hidden">
<header>
  <div class="logo" onclick="goHome()">KRUPA <em>IELTS PREP</em></div>
  <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <div class="date-pill" id="dpill"></div>
    <div id="userChip"></div>
  </div>
</header>
<nav>
  <button class="ntab active" id="nt0" onclick="showSec('home')">🏠 Home</button>
  <button class="ntab" id="nt1" onclick="showSec('reading')">📖 Reading <span class="nbadge" id="rb">0/20</span></button>
  <button class="ntab" id="nt2" onclick="showSec('writing')">✍️ Writing <span class="nbadge" style="background:var(--amber)" id="wb">0/20</span></button>
  <button class="ntab" id="nt3" onclick="showSec('listening')">🎧 Listening <span class="nbadge" style="background:var(--listening)" id="lb">0/20</span></button>
</nav>
<main id="main"></main>

<script>
// ══════════════════════════════════════
// ALL 20 READING EXERCISES (pre-written)
// ══════════════════════════════════════
const READING = [
{title:"The Science of Sleep",text:`Sleep is a fundamental biological process that affects nearly every system in the human body. Despite spending roughly one-third of our lives asleep, scientists are still uncovering the complex mechanisms that govern this essential state. Research over the past two decades has revolutionised our understanding of what actually happens during sleep.\n\nThe brain cycles through several distinct stages during a typical night's sleep. The two main categories are non-rapid eye movement (NREM) sleep and rapid eye movement (REM) sleep. During NREM sleep, the body repairs tissues, builds bone and muscle, and strengthens the immune system. REM sleep, by contrast, is associated with dreaming and plays a critical role in memory consolidation and emotional regulation.\n\nChronic sleep deprivation has been linked to a wide range of health problems. Studies have demonstrated that consistently sleeping fewer than seven hours per night increases the risk of obesity, type 2 diabetes, cardiovascular disease, and certain mental health disorders. The immune system also suffers: people who sleep less than six hours are four times more likely to catch a common cold when exposed to the virus than those who sleep seven or more hours.\n\nModern lifestyles pose significant challenges to healthy sleep. Artificial light, particularly the blue light emitted by smartphones and computers, suppresses the production of melatonin — the hormone that regulates the sleep-wake cycle. Researchers recommend avoiding screens for at least one hour before bedtime and keeping bedroom environments dark, cool, and quiet.\n\nInterestingly, the amount of sleep needed varies across the lifespan. Newborns require up to 17 hours daily, while teenagers need approximately 8 to 10 hours. Most adults function best with 7 to 9 hours, and older adults often find that 7 to 8 hours is sufficient. Individual variation exists, however, and a small percentage of people carry genetic mutations that allow them to thrive on as little as four to six hours per night.`,
questions:[
{type:"tfng",q:"Scientists now fully understand all mechanisms that govern sleep.",answer:"FALSE",options:["TRUE","FALSE","NOT GIVEN"]},
{type:"tfng",q:"REM sleep plays a role in memory consolidation.",answer:"TRUE",options:["TRUE","FALSE","NOT GIVEN"]},
{type:"tfng",q:"Blue light from screens increases melatonin production.",answer:"FALSE",options:["TRUE","FALSE","NOT GIVEN"]},
{type:"mcq",q:"How much more likely are people sleeping under 6 hours to catch a cold?",options:["Twice as likely","Three times as likely","Four times as likely","Five times as likely"],answer:"Four times as likely"},
{type:"mcq",q:"How many hours of sleep do most adults need per night?",options:["5–6 hours","6–7 hours","7–9 hours","9–11 hours"],answer:"7–9 hours"},
{type:"short",q:"What hormone regulates the sleep-wake cycle?",answer:"melatonin"},
{type:"short",q:"What are the two main categories of sleep mentioned in the passage?",answer:"NREM and REM"}
]},
{title:"Urban Farming and Food Security",text:`As the global population edges towards ten billion by 2050, the question of how to feed everyone sustainably has become one of the defining challenges of our time. Urban farming — the practice of cultivating food within city boundaries — is increasingly being championed as part of the solution.\n\nThe concept is far from new. During World War II, victory gardens in the United States and United Kingdom produced approximately 40% of the vegetables consumed domestically. Today, however, urban agriculture has evolved dramatically. Rooftop gardens, vertical farms, hydroponic systems, and community plots are transforming idle urban spaces into productive food sources.\n\nVertical farming is among the most technologically sophisticated approaches. Crops are grown in stacked layers inside climate-controlled warehouses, often using LED lighting and hydroponic or aeroponic systems that eliminate the need for soil. Proponents argue that vertical farms can produce up to 100 times more food per square metre than conventional agriculture. They also use up to 95% less water, generate no agricultural runoff, and can operate year-round regardless of weather conditions.\n\nDespite these advantages, urban farming faces significant challenges. The energy costs of artificial lighting and climate control can be substantial, raising questions about the net environmental benefit. Land in cities is expensive and often contested, and zoning regulations may restrict agricultural use. Not all crops are economically viable — leafy greens and herbs thrive in vertical systems, but staple crops such as wheat and rice remain impractical to grow indoors at scale.\n\nNevertheless, urban farming offers social as well as ecological benefits. Community gardens have been shown to strengthen neighbourhood cohesion, provide therapeutic value, and improve access to fresh produce in food deserts — areas with limited availability of affordable, nutritious food.`,
questions:[
{type:"tfng",q:"Victory gardens during World War II produced 40% of domestically consumed vegetables.",answer:"TRUE",options:["TRUE","FALSE","NOT GIVEN"]},
{type:"tfng",q:"Vertical farms require large amounts of water compared to conventional farming.",answer:"FALSE",options:["TRUE","FALSE","NOT GIVEN"]},
{type:"tfng",q:"Urban farming is legally permitted in all cities worldwide.",answer:"NOT GIVEN",options:["TRUE","FALSE","NOT GIVEN"]},
{type:"mcq",q:"How much more food per square metre can vertical farms produce compared to conventional agriculture?",options:["Up to 10 times more","Up to 50 times more","Up to 100 times more","Up to 200 times more"],answer:"Up to 100 times more"},
{type:"mcq",q:"Which crops are described as impractical to grow indoors at scale?",options:["Herbs and salad leaves","Tomatoes and peppers","Wheat and rice","Mushrooms and spinach"],answer:"Wheat and rice"},
{type:"short",q:"What term describes areas with limited access to affordable, nutritious food?",answer:"food deserts"},
{type:"short",q:"What percentage less water do vertical farms use compared to conventional agriculture?",answer:"95%"}
]},
{title:"The Psychology of Decision Making",text:`Every day, humans make thousands of decisions, from trivial choices like what to eat for breakfast to momentous ones like career changes or financial investments. Psychologists have long sought to understand how these decisions are made and why humans are so often irrational in their choices.\n\nThe traditional economic model assumed that people are rational actors who carefully weigh costs and benefits before making optimal decisions. This view was fundamentally challenged in the 1970s by psychologists Daniel Kahneman and Amos Tversky, whose research on cognitive biases demonstrated that human judgment is systematically flawed in predictable ways.\n\nKahneman later described two systems of thinking in his influential work. System 1 is fast, intuitive, and emotional — it operates automatically and effortlessly. System 2 is slow, deliberate, and logical — it requires conscious effort and mental energy. Most daily decisions rely on System 1, which, while efficient, is prone to errors and biases.\n\nOne of the most well-documented biases is loss aversion: the tendency to feel the pain of losses more acutely than the pleasure of equivalent gains. Research suggests that losses feel approximately twice as powerful as gains of the same magnitude. This explains why people often hold on to failing investments far longer than rational analysis would suggest — the anticipated pain of selling at a loss outweighs the logical benefits of cutting one's losses.\n\nAnchoring is another pervasive bias. When making estimates or decisions, people rely too heavily on the first piece of information they receive — the anchor — even when that information is irrelevant. In one famous experiment, participants who spun a wheel that landed on a high number subsequently gave higher estimates for unrelated questions than those whose wheel landed on a low number.\n\nUnderstanding these biases has practical applications in fields ranging from public health to financial planning, as policymakers design environments — or nudges — that guide people towards better decisions without restricting their freedom of choice.`,
questions:[
{type:"tfng",q:"Kahneman and Tversky's research supported the traditional economic model of rational decision-making.",answer:"FALSE",options:["TRUE","FALSE","NOT GIVEN"]},
{type:"tfng",q:"System 2 thinking requires more mental effort than System 1.",answer:"TRUE",options:["TRUE","FALSE","NOT GIVEN"]},
{type:"tfng",q:"All cognitive biases can be eliminated through education.",answer:"NOT GIVEN",options:["TRUE","FALSE","NOT GIVEN"]},
{type:"mcq",q:"According to the passage, how much more powerful do losses feel compared to equivalent gains?",options:["Equally powerful","Approximately 1.5 times","Approximately twice","Three times"],answer:"Approximately twice"},
{type:"mcq",q:"What is the term for the bias where people rely too heavily on the first piece of information received?",options:["Loss aversion","Anchoring","Confirmation bias","Framing effect"],answer:"Anchoring"},
{type:"short",q:"What name did Kahneman give to the fast, intuitive system of thinking?",answer:"System 1"},

{title:"Ocean Plastic Pollution",text:`The world's oceans are in crisis. Every year, an estimated eight million tonnes of plastic waste enters the marine environment — the equivalent of dumping one garbage truck of plastic into the sea every minute. This pollution poses a catastrophic threat to marine ecosystems, wildlife, and ultimately human health.\n\nPlastic is exceptionally durable. Most plastic products that enter the ocean do not biodegrade; instead, they break down into progressively smaller fragments known as microplastics — particles smaller than five millimetres in diameter. These microscopic pieces have been found in the deepest ocean trenches, the most remote Arctic ice, and in the bodies of marine animals from tiny zooplankton to blue whales.\n\nThe impact on marine wildlife is severe. Sea turtles frequently mistake plastic bags for jellyfish, their primary food source, and can die from intestinal blockages. Seabirds feed plastic debris to their chicks, leading to malnutrition and death. Studies of albatrosses on Midway Atoll have found that virtually every chick contains plastic in its stomach, ingested from food brought by parents foraging thousands of kilometres away.\n\nFor humans, the risks are increasingly concerning. Microplastics have been detected in human blood, lung tissue, and breast milk. While the long-term health effects remain under investigation, many plastics contain chemical additives — including endocrine disruptors — that have known harmful effects on biological systems.\n\nSolutions require action at multiple levels. At the individual level, reducing single-use plastic consumption makes a meaningful difference. At the corporate level, redesigning products and packaging for recyclability is essential. At the policy level, extended producer responsibility legislation — which holds manufacturers financially responsible for the end-of-life management of their products — has shown promise in reducing plastic waste in countries where it has been implemented.`,

{title:"The History of Antibiotics",text:`Few medical discoveries have saved more lives than antibiotics. Before their introduction, bacterial infections that today are easily treated — pneumonia, scarlet fever, infected wounds — were frequently fatal. The story of antibiotics begins in 1928 with Alexander Fleming's accidental observation that a mould contaminating one of his bacterial cultures was killing the surrounding bacteria.\n\nFleming identified the mould as Penicillium notatum and named the antibacterial substance it produced penicillin. However, he struggled to produce it in sufficient quantities and the discovery sat largely dormant until the 1940s, when Howard Florey and Ernst Chain developed methods to purify and mass-produce penicillin. By 1944, penicillin was being manufactured in quantities sufficient to treat all wounded Allied soldiers — a development that historians credit with saving tens of thousands of lives during World War II.\n\nFollowing the success of penicillin, researchers developed many other classes of antibiotics throughout the 1950s and 1960s — a period sometimes called the golden age of antibiotic discovery. These drugs transformed medicine, making previously dangerous surgeries routine, enabling organ transplants, and allowing cancer chemotherapy that suppresses the immune system.\n\nHowever, bacteria evolve rapidly, and the overuse and misuse of antibiotics has accelerated the emergence of resistant strains. Antimicrobial resistance (AMR) is now considered one of the greatest threats to global health. The World Health Organisation has warned that without urgent action, drug-resistant infections could cause ten million deaths annually by 2050 — more than cancer currently kills each year.\n\nAddressing AMR requires reducing unnecessary antibiotic prescriptions, improving sanitation to prevent infections in the first place, investing in the development of new antibiotics, and educating the public about the importance of completing full courses of treatment rather than stopping when symptoms improve.`,

{title:"Renewable Energy Storage",text:`The rapid expansion of solar and wind energy has created one of the central challenges of modern energy systems: storage. Unlike fossil fuel power plants, which can generate electricity on demand, solar panels and wind turbines produce energy only when the sun shines and the wind blows. Solving the storage problem is essential to achieving a fully renewable energy grid.\n\nLithium-ion batteries, the same technology used in smartphones and electric vehicles, currently dominate the grid-scale storage market. Their energy density, declining costs — which have fallen by more than 90% since 2010 — and rapid response times make them well-suited for short-term storage. However, lithium-ion batteries are typically designed to provide storage for four to eight hours, which is insufficient for handling multi-day periods of low solar and wind generation.\n\nLong-duration storage technologies are therefore attracting growing investment and research attention. Pumped hydropower — where water is pumped uphill during periods of excess electricity and released through turbines when demand rises — currently provides over 90% of global grid storage capacity. However, suitable sites for new pumped hydro projects are geographically limited.\n\nGreen hydrogen represents another promising approach. Surplus renewable electricity is used to split water into hydrogen and oxygen through electrolysis. The hydrogen can then be stored and later used in fuel cells or combustion to generate electricity. While the round-trip efficiency of hydrogen storage is currently lower than that of batteries, its potential for seasonal storage — preserving summer's solar energy for winter use — makes it strategically important.\n\nFlow batteries, compressed air energy storage, and even gravity-based systems using heavy weights and cranes are among the other technologies under development. The diversity of approaches reflects the scale of the challenge and the urgency of solving it as the world transitions away from fossil fuels.`,

{title:"The Neuroscience of Memory",text:`Memory is not a single, unified system but rather a collection of distinct processes distributed across different brain regions. Understanding how memories form, are stored, and are retrieved has been one of the most productive areas of neuroscience over the past half century.\n\nThe hippocampus, a seahorse-shaped structure deep within the temporal lobe, plays a central role in forming new declarative memories — memories for facts and events that can be consciously recalled. The famous case of patient H.M., who had his hippocampus surgically removed in 1953 to treat severe epilepsy, revealed this dramatically: he was permanently unable to form new long-term memories, though he retained memories from before the surgery and could learn new motor skills normally.\n\nAt the cellular level, memories are thought to form through a process called long-term potentiation (LTP). When neurons fire together repeatedly, the synaptic connections between them are strengthened, making it easier for the same pattern to fire in the future. This is captured in the phrase, attributed to neuropsychologist Donald Hebb: "neurons that fire together, wire together."\n\nMemories are not stored as fixed recordings but are reconstructed each time they are recalled. This reconstruction process means memories are vulnerable to distortion. Research by psychologist Elizabeth Loftus demonstrated that false memories can be implanted through suggestion: participants could be led to believe they had experienced events that never occurred, such as being lost in a shopping mall as a child.\n\nSleep plays a vital role in memory consolidation — the process by which new memories are stabilised and integrated with existing knowledge. During slow-wave sleep in particular, the brain replays experiences from the day, strengthening important memories and discarding irrelevant information.`,

{title:"Digital Privacy and Surveillance",text:`The digital age has brought unprecedented convenience, but it has also enabled a scale of personal data collection that raises profound questions about privacy, autonomy, and power. Every search query, online purchase, location ping, and social media interaction generates data that is routinely collected, analysed, and monetised by corporations and, in some cases, governments.\n\nThe business model of many internet platforms depends on advertising revenue, which in turn depends on delivering targeted advertisements to users based on their behaviour and preferences. This requires the continuous collection of personal data. Critics argue that users rarely understand the full extent of data collection when they agree to terms of service, which are typically long, complex documents that few people read in full.\n\nGovernment surveillance raises different but equally serious concerns. Following the 2013 revelations by former National Security Agency contractor Edward Snowden, it became clear that intelligence agencies in the United States and allied countries were conducting mass surveillance programmes that collected communications data on millions of ordinary citizens without individual warrants.\n\nChina's social credit system, still widely misunderstood in Western media, represents a different model: a collection of government and private-sector schemes that rate citizens' and businesses' compliance with laws and regulations. Supporters argue it improves trust in commercial transactions; critics describe it as authoritarian control over behaviour.\n\nIn response to growing concerns, the European Union introduced the General Data Protection Regulation (GDPR) in 2018 — widely regarded as the world's strongest data privacy law. It grants individuals the right to access their data, correct inaccuracies, and in certain circumstances, demand its deletion — the so-called "right to be forgotten." Companies found in violation face fines of up to four percent of annual global turnover.`,

{title:"Biodiversity and Ecosystems",text:`Biodiversity — the variety of life on Earth — is the foundation upon which all ecosystems, and ultimately human civilisation, depend. Scientists estimate that Earth is home to between eight and ten million species, of which fewer than two million have been formally described. Yet this extraordinary diversity is under unprecedented threat.\n\nThe current rate of species extinction is estimated to be between 100 and 1,000 times higher than the natural background rate. Many scientists refer to this as the sixth mass extinction event in Earth's history — the previous five having been caused by catastrophic natural events such as asteroid impacts and volcanic eruptions. The current crisis, by contrast, is driven almost entirely by human activity.\n\nHabitat destruction is the leading cause of biodiversity loss. The conversion of forests, wetlands, and grasslands to agricultural land has eliminated or degraded habitats for countless species. The Amazon rainforest, which contains approximately 10% of all species on Earth, has lost around 17% of its original cover due to deforestation, primarily for cattle ranching and soya cultivation.\n\nBiodiversity loss matters far beyond the ethical dimension of protecting other species. Ecosystems provide services that underpin human survival: clean water filtration, air purification, pollination of crops, climate regulation, and the provision of genetic resources for medicine and agriculture. It is estimated that natural pollination services alone are worth over $200 billion annually to global food production.\n\nConservation strategies include the designation of protected areas, restoration of degraded habitats, reintroduction of locally extinct species, and international agreements such as the Convention on Biological Diversity. Scientists increasingly emphasise that conservation cannot succeed in isolation from addressing poverty, land rights, and economic incentives that drive habitat destruction.`,

{title:"Space Tourism",text:`For most of human history, the idea of ordinary citizens travelling to space was confined to science fiction. The twenty-first century has transformed that fiction into a nascent industry. Commercial space tourism, once the exclusive domain of government astronauts, is now becoming accessible — albeit at extraordinary cost — to private individuals.\n\nThe modern era of space tourism began in 2001 when American businessman Dennis Tito paid approximately $20 million for an eight-day stay aboard the International Space Station, becoming the first private citizen to travel to space. Since then, the landscape has changed dramatically. Companies including SpaceX, Blue Origin, and Virgin Galactic have invested billions in developing vehicles capable of carrying private passengers beyond Earth's atmosphere.\n\nTwo distinct tiers of space tourism have emerged. Suborbital flights, offered by companies such as Blue Origin and Virgin Galactic, carry passengers to the edge of space — technically defined as 100 kilometres above Earth — for several minutes of weightlessness before returning. These experiences are priced at between $250,000 and $500,000 per seat. Orbital experiences, which involve actually circling Earth, are far more expensive: SpaceX has charged customers tens of millions of dollars per seat.\n\nProponents argue that commercial space tourism will drive technological innovation, reduce launch costs through competition, and ultimately enable human expansion beyond Earth. Critics raise concerns about the environmental cost — rocket launches produce significant carbon emissions and may damage the stratosphere — and question whether vast resources should be directed towards space tourism while pressing problems on Earth remain unsolved.\n\nThe regulatory framework for commercial spaceflight is still evolving. In the United States, the Federal Aviation Administration oversees commercial launch licences, but the industry largely operates under an "informed consent" model, where passengers acknowledge the risks rather than receiving the full regulatory protection accorded to commercial airline passengers.`,

{title:"Gut Microbiome and Health",text:`Within the human digestive tract lives an extraordinary ecosystem of approximately 38 trillion microorganisms — bacteria, viruses, fungi, and other microbes — collectively known as the gut microbiome. Research over the past decade has revealed that this internal ecosystem plays a far more profound role in human health than previously imagined.\n\nThe gut microbiome aids digestion by breaking down complex carbohydrates and dietary fibre that human enzymes cannot process. In doing so, gut bacteria produce short-chain fatty acids, which provide energy for the cells lining the colon and help regulate inflammation throughout the body. A diverse microbiome — one containing a wide variety of microbial species — is generally associated with better health outcomes.\n\nPerhaps most surprisingly, scientists have discovered a two-way communication pathway between the gut and the brain, known as the gut-brain axis. The gut contains approximately 500 million neurons and produces around 90% of the body's serotonin — a neurotransmitter associated with mood regulation. Research in both animal models and humans has linked the composition of the gut microbiome to conditions including depression, anxiety, and autism spectrum disorder, though the mechanisms are complex and causality has not been definitively established.\n\nFactors that negatively affect the microbiome include the overuse of antibiotics, which kill beneficial bacteria alongside harmful ones, diets high in processed foods and low in fibre, chronic stress, and lack of physical activity. Conversely, a diet rich in diverse plant foods, fermented products such as yoghurt and kimchi, and adequate sleep are associated with a healthier microbiome.\n\nThe microbiome is established early in life, with birth method playing a role: babies born vaginally are colonised by their mother's vaginal and gut bacteria, while those born by caesarean section have different initial microbial communities. Breastfeeding further shapes microbiome development, providing both bacteria and prebiotic compounds that feed beneficial microbes.`,

{title:"Quantum Computing",text:`Quantum computing represents one of the most profound technological frontiers of the twenty-first century. While conventional computers process information in binary — representing data as bits that are either 0 or 1 — quantum computers exploit the principles of quantum mechanics to perform calculations in fundamentally different and potentially far more powerful ways.\n\nThe basic unit of quantum information is the qubit. Unlike classical bits, qubits can exist in a superposition of 0 and 1 simultaneously, thanks to the quantum mechanical principle of superposition. This means that a quantum computer with n qubits can process 2ⁿ states simultaneously. A system of 300 qubits, for instance, could theoretically represent more states simultaneously than there are atoms in the observable universe.\n\nA second quantum phenomenon exploited by quantum computers is entanglement, where two or more qubits become correlated such that the state of one instantly influences the state of the other, regardless of the distance between them. This property allows quantum computers to perform certain computations with unprecedented efficiency.\n\nDespite enormous investment from companies including IBM, Google, and Microsoft, as well as national governments, practical quantum computing remains in its early stages. Current quantum computers are highly error-prone, requiring extremely cold operating temperatures — close to absolute zero — and are very sensitive to interference from the surrounding environment, a challenge known as decoherence.\n\nThe applications that excite researchers most include drug discovery and materials science, where quantum computers could simulate molecular interactions with a precision impossible for classical machines; breaking current encryption systems; and optimising complex logistical networks. Governments worldwide have begun investing heavily in quantum technology, recognising that leadership in this field may confer significant strategic and economic advantages.`,

{title:"The Impact of Social Media",text:`Social media platforms have transformed how billions of people communicate, consume information, and perceive themselves and the world around them. Since Facebook launched to the general public in 2006, followed by Twitter, Instagram, YouTube, TikTok, and others, these platforms have reshaped public discourse, political campaigns, business models, and personal relationships.\n\nResearch on the psychological effects of social media has produced mixed findings. Some studies link heavy social media use to increased rates of anxiety, depression, and loneliness, particularly among adolescents. One proposed mechanism is social comparison: platforms are designed to showcase idealised versions of users' lives, and constant exposure to others' apparent success and happiness can damage self-esteem. The "like" system activates dopamine pathways in the brain, creating feedback loops that encourage compulsive checking behaviour.\n\nHowever, social media also provides genuine benefits. For marginalised communities, online spaces can offer connection, solidarity, and visibility unavailable in their immediate physical environments. Social movements such as #MeToo and Black Lives Matter gained global momentum through social media, demonstrating its power to accelerate social change. During natural disasters and public health crises, platforms have facilitated rapid information sharing and coordination of aid.\n\nThe spread of misinformation represents one of the most serious challenges associated with social media. Algorithms designed to maximise engagement tend to amplify emotionally provocative content, regardless of its accuracy. Research has found that false news spreads faster and more widely than true news on Twitter, partly because novelty drives sharing behaviour.\n\nRegulators worldwide are grappling with how to govern these platforms without stifling free expression. The European Union's Digital Services Act, which came into force in 2023, imposes new obligations on large platforms regarding content moderation, algorithmic transparency, and user rights — representing the most comprehensive attempt yet to regulate social media at scale.`,

{title:"Volcanic Eruptions and Climate",text:`Volcanoes are among the most powerful forces on Earth, capable of reshaping landscapes, threatening ecosystems, and influencing global climate patterns. While individual eruptions can cause immediate local devastation, large-scale volcanic events have historically triggered significant and long-lasting changes to Earth's climate system.\n\nThe mechanism through which volcanoes affect climate is primarily atmospheric. During major eruptions, vast quantities of sulphur dioxide are injected into the stratosphere, where they react with water vapour to form sulphate aerosols. These tiny reflective particles scatter incoming solar radiation back into space, reducing the amount of sunlight reaching Earth's surface and causing temporary cooling — sometimes referred to as volcanic winter.\n\nThe 1815 eruption of Mount Tambora in Indonesia is the most dramatic modern example. It was the largest volcanic eruption in recorded history, ejecting an estimated 150 cubic kilometres of material. The following year, 1816, became known as "the Year Without a Summer": temperatures dropped significantly across the Northern Hemisphere, leading to widespread crop failures, famine, and social unrest. In New England, frost was recorded in every summer month.\n\nNot all volcanic effects cool the climate. Volcanoes also emit carbon dioxide, a greenhouse gas that traps heat. Over geological timescales, volcanic CO2 emissions have played a role in regulating Earth's long-term climate. During periods of intense volcanic activity associated with the formation of large igneous provinces, CO2 output has been linked to episodes of global warming and even mass extinction events.\n\nModern volcanology has advanced considerably. Monitoring networks of seismographs, GPS sensors, and gas detectors allow scientists to detect early warning signs of volcanic unrest and issue evacuations in time to save lives — though predicting the exact timing and magnitude of eruptions remains an imprecise science.`,

{title:"Rewilding and Ecosystem Restoration",text:`Rewilding — the large-scale restoration of wild areas to allow natural processes to resume — has emerged as one of the most ambitious and controversial conservation strategies of the twenty-first century. Moving beyond the traditional conservation model of protecting what remains, rewilding advocates for actively restoring what has been lost.\n\nThe concept gained scientific credibility through the work of ecologists studying trophic cascades — the chain reactions triggered through food webs when a keystone species is removed or restored. The reintroduction of wolves to Yellowstone National Park in 1995 is the most celebrated example. As wolf numbers recovered, they reduced overgrazing by deer, which allowed riverbank vegetation to regenerate, stabilised stream banks, changed the course of rivers, and increased habitat diversity for numerous other species — a phenomenon ecologists have called the "landscape of fear."\n\nIn Europe, rewilding projects have reintroduced beavers, lynx, bison, and white-tailed eagles to areas from which they had been absent for decades or centuries. Beavers in particular have proven extraordinarily effective ecosystem engineers: their dams slow water flow, raise water tables, create wetlands, and dramatically increase local biodiversity. Studies in Scotland have found that beaver-modified streams support significantly greater numbers of insects, fish, birds, and aquatic plants than unmodified streams.\n\nOpponents of rewilding raise practical concerns. Large predators such as wolves and lynx inevitably come into conflict with farmers and livestock owners, raising questions about compensation and coexistence. Rewilding also requires substantial land — a scarce resource competing with agriculture and human settlement.\n\nDespite these challenges, the scientific case for rewilding is strengthening. Restored ecosystems provide services including carbon sequestration, flood regulation, and clean water — benefits that can be quantified in economic terms and weighed against the costs of restoration.`,

{title:"Language Extinction",text:`Of the approximately 7,000 languages spoken in the world today, linguists estimate that between 50 and 90% will be extinct or severely endangered by the end of the twenty-first century. A language dies, on average, every two weeks. This crisis of linguistic diversity is one of the least-discussed environmental and cultural emergencies of our time.\n\nLanguage extinction typically follows a predictable pattern. As speakers of a minority language are exposed to a dominant one — often through migration, education policy, or economic necessity — bilingualism increases. The next generation may speak both languages but favour the dominant one in public and professional settings. Eventually, children grow up speaking only the dominant language, and with the death of the last fluent speakers, the minority language is lost.\n\nColonialism has been a major driver of language extinction. European colonisation across the Americas, Africa, Asia, and Oceania often actively suppressed indigenous languages through policies that punished their use in schools and public life. In Australia, Aboriginal children were removed from their families in the early to mid-twentieth century partly to assimilate them into Anglo-Australian culture and language — a policy now widely condemned as cultural genocide.\n\nThe loss of a language represents a profound cultural tragedy. Languages encode unique ways of understanding the world: knowledge of local plants, animals, navigation techniques, ecological relationships, and social practices that may not exist in any written form. When a language dies, this knowledge often disappears with it.\n\nEfforts to revitalise endangered languages have met with mixed success. Welsh is frequently cited as a success story: aggressive government intervention, including mandatory Welsh instruction in schools and the creation of a Welsh-language television channel, has stabilised speaker numbers. By contrast, the revival of Hawaiian, once reduced to fewer than 2,000 speakers, has produced a new generation of fluent speakers through immersion schooling programmes.`,

{title:"Aviation and Carbon Emissions",text:`Aviation accounts for approximately 2.5% of global CO2 emissions, a figure that may seem modest until one considers that flying is one of the most carbon-intensive activities an individual can undertake. A single return flight from London to New York produces roughly the same CO2 as three months of an average European's land-based emissions. The sector's rapid pre-pandemic growth and the particular impact of high-altitude emissions make aviation a significant and contested part of the climate challenge.\n\nJet aircraft burn kerosene, a refined petroleum product with no currently viable substitute at commercial scale. Unlike road transport, which is rapidly electrifying, aviation faces fundamental physical constraints: batteries capable of powering large commercial aircraft for long distances remain far beyond current technology. The energy density of even the most advanced lithium-ion batteries is approximately 50 times lower than that of jet fuel.\n\nSeveral pathways to decarbonising aviation are under development. Sustainable aviation fuels (SAFs) — produced from biomass, waste materials, or synthesised using renewable electricity — can be burned in existing engines and could reduce lifecycle emissions by up to 80% compared to conventional jet fuel. However, current SAF production meets only a tiny fraction of global aviation demand, and scaling production faces significant land-use and cost challenges.\n\nHydrogen-powered aircraft are being actively developed by companies including Airbus, which aims to bring a commercial hydrogen plane to market by 2035. Hydrogen is three times more energy-dense than jet fuel by weight, but its extremely low density by volume requires either heavy compression or cryogenic storage, creating significant engineering challenges.\n\nThe most immediate and effective way to reduce aviation's climate impact is to fly less. A phenomenon sometimes called "flight shame," which originated in Scandinavia, has encouraged some travellers to choose rail over air for shorter journeys. European rail investment and high-speed rail expansion are increasingly cited as essential complements to aviation decarbonisation.`,

{title:"The History of the Internet",text:`The internet is so embedded in modern life that it is difficult to imagine a world without it. Yet its origins lie in the Cold War anxieties of the 1960s and the visionary thinking of a small group of computer scientists who laid the foundations for a global communication network.\n\nThe immediate precursor to the internet was ARPANET, developed by the United States Defense Advanced Research Projects Agency (DARPA) and launched in 1969. ARPANET connected computers at four American universities — UCLA, Stanford Research Institute, UC Santa Barbara, and the University of Utah — allowing researchers to share data and computing resources. The system used a technique called packet switching, which broke messages into small chunks that could travel independently across the network and be reassembled at their destination.\n\nThe fundamental protocols that define the modern internet — TCP/IP (Transmission Control Protocol/Internet Protocol) — were developed by Vint Cerf and Bob Kahn in the early 1970s. These protocols provided a universal language allowing different computer networks to communicate with each other. ARPANET adopted TCP/IP on 1 January 1983 — a date sometimes called the "birthday of the internet."\n\nThe internet remained primarily a tool for academics and researchers until 1991, when Tim Berners-Lee, a British scientist working at CERN, introduced the World Wide Web — a system of interconnected documents accessible through browsers using hyperlinks. The Web transformed the internet from a specialist tool into a mass medium.\n\nThe subsequent commercialisation of the internet during the 1990s, the dot-com boom and bust, the emergence of social media in the 2000s, and the rise of smartphones have collectively produced the interconnected digital world of today. An estimated five billion people — more than 60% of the global population — now have access to the internet.`,

{title:"Sustainable Fashion",text:`The fashion industry is one of the world's most polluting sectors, responsible for an estimated 10% of global carbon dioxide emissions annually — more than international aviation and shipping combined. It is also the second-largest consumer of water: producing a single pair of jeans requires approximately 7,500 litres — equivalent to around seven years of drinking water for one person. The rise of "fast fashion" — the mass production of inexpensive, trend-driven clothing designed for rapid disposal — has dramatically accelerated these environmental impacts.\n\nFast fashion companies such as Zara and H&M release dozens of new collections per year, compared to the two seasonal collections that were standard in the fashion industry a generation ago. Low prices are made possible by extensive global supply chains that typically locate manufacturing in countries where labour costs and environmental regulations are lowest. The collapse of the Rana Plaza garment factory in Bangladesh in 2013, which killed over 1,100 workers, became a catalyst for renewed scrutiny of labour conditions in the fashion supply chain.\n\nThe environmental damage extends beyond production. Synthetic fibres — polyester, nylon, and acrylic — account for around 60% of clothing materials globally. These fibres shed microplastics with every wash, with studies estimating that a single laundry load can release hundreds of thousands of plastic fibres into wastewater systems that filters cannot fully capture.\n\nSustainable fashion encompasses a range of alternatives: natural and organic fibres, recycled materials, circular business models where clothing is rented, repaired, or resold rather than discarded, and reduced consumption overall. Some brands have committed to ambitious sustainability targets, though critics accuse many of greenwashing — making misleading claims about environmental credentials.\n\nConsumer behaviour is shifting, particularly among younger generations. Second-hand platforms such as Vinted and Depop have grown rapidly, and rental fashion is gaining traction in formal and occasion-wear markets.`,

{title:"Part 1 — Doctor's Appointment",subtitle:"A patient calls to book an appointment and receives health advice",accent:"British English",
text:`Receptionist: Good morning, Parkview Medical Centre.

Receptionist: Perfect. And is this the same address — forty-two Birchwood Avenue?

Patient: I understand. Is there anything I can do before Friday?
Receptionist: The doctor may ask you to keep a symptom diary — just note down when the cough is worst, whether it's dry or producing mucus, and anything that makes it better or worse. That will help Dr Hassan assess you more efficiently.

{title:"Part 2 — Radio Travel Report",subtitle:"A travel journalist gives a radio report on sustainable tourism",accent:"British English",
text:`Good evening and welcome to World Horizons on Radio Four. I'm Gemma Clarke, and tonight I'm reporting from Costa Rica, widely regarded as one of the world's leading destinations for sustainable tourism — or eco-tourism as it's commonly called.

Costa Rica is a small country — about the size of Denmark — but it packs an extraordinary amount of biodiversity into its borders. It contains approximately 5% of the world's total species despite covering just 0.03% of the Earth's surface. Remarkably, over 25% of its land is designated as protected national parks and reserves.

The country's commitment to environmental protection dates back to the 1970s, when the government began reversing decades of deforestation. Forest cover, which had fallen to just 21% by 1983, has now recovered to over 60% — one of the great conservation success stories of our time.

Tourism has played a central role in this recovery. The country receives approximately three million visitors per year, and nature tourism is by far the most popular draw. Entry fees to national parks go directly to conservation funding — Tortuguero National Park alone generates over one million dollars in entry fees annually.

However, challenges remain. Some popular destinations face overcrowding, and the construction of tourist infrastructure has damaged some of the habitats it was meant to celebrate. The government has introduced a certification scheme for sustainable tourism businesses, with hotels and tour operators rated on a scale of one to five leaves — the higher the rating, the more sustainably the business operates.

If you're planning a visit, the dry season from December to April is generally considered the best time to travel, with reliable sunshine and good road conditions.`,

]},
{title:"Part 1 — University Accommodation Office",subtitle:"A student enquires about university housing options",accent:"British English",
text:`Officer: Accommodation Office, how can I help?
Student: Hi, I'm a first-year student and I'm interested in finding out about university accommodation for next year.
Officer: Of course. We have several options for returning students. Our most popular is Elmwood Hall — it's a self-catered residence about a ten-minute walk from the main campus. Single en-suite rooms are four hundred and sixty pounds per month.
Student: Is there a catered option?
Officer: Yes, Greenfield House offers full board — three meals a day included — for five hundred and eighty pounds per month. It's on campus, so very convenient. However, I should mention that Greenfield is usually very competitive — most rooms are allocated by ballot in February.
Student: I see. What about private houses?
Officer: We manage a list of approved private landlords — the properties have all been inspected and meet our safety standards. Typical rent for a room in a shared house is around three hundred and fifty to four hundred pounds per month, excluding bills.
Student: Can I apply online?
Officer: Yes, all applications go through the university housing portal. The deadline for next academic year is the thirty-first of March. Late applications are considered if spaces remain, but there's no guarantee.
Student: Do I need a guarantor?
Officer: For university-managed accommodation, no. For private rentals, landlords typically require a UK-based guarantor or a six-month rent payment in advance if you're an international student.
Student: That's very helpful. My name is Yemi Adebayo — could I receive this information by email?
Officer: Certainly. I'll send a full information pack to your university email address.`,

{title:"Part 2 — Wildlife Documentary Narration",subtitle:"A nature documentary about the Arctic ecosystem",accent:"British English",
text:`The Arctic. A world of extremes. For most of the year, this vast wilderness sits beneath temperatures that plunge to minus forty degrees Celsius, cloaked in perpetual darkness. Yet for a brief, spectacular window in summer, the Arctic bursts into life in ways that few other ecosystems can match.

The polar bear — Ursus maritimus — is the Arctic's apex predator and the animal most closely associated with this region. Adult males typically weigh between four hundred and six hundred kilograms, making them the world's largest land carnivore. Their white fur, which is actually transparent and hollow, traps heat and provides camouflage against the snow and ice.

Sea ice is central to the polar bear's survival. Bears rely on it as a platform from which to hunt their primary prey — ringed seals — waiting motionless at breathing holes for hours, sometimes days. As climate change has caused Arctic sea ice to thin and retreat, polar bears must swim further between ice floes, expending critical energy reserves. Since 1979, the Arctic has lost approximately 13% of its sea ice per decade.

The Arctic also hosts one of the world's great migration spectacles. Each spring, caribou herds numbering in the hundreds of thousands travel north across the tundra to calving grounds, followed by wolves, bears, and golden eagles. The calving period is brief — calves must be strong enough to travel within hours of birth.

Perhaps the most dramatic symbol of Arctic change is the permafrost — the layer of permanently frozen ground beneath the tundra. As temperatures rise, permafrost is thawing and releasing methane — a greenhouse gas many times more potent than CO2 — creating a potentially catastrophic feedback loop.`,
questions:[
{q:"What is the minimum temperature in the Arctic in winter?",answer:"minus 40 degrees Celsius / -40°C",type:"short"},
{q:"What is the weight range of adult male polar bears?",answer:"400 to 600 kg / kilograms",type:"short"},
{q:"What is the polar bear's primary prey?",answer:"ringed seals",type:"short"},
{q:"What percentage of Arctic sea ice has been lost per decade since 1979?",answer:"13%",type:"short"},
{q:"How quickly must caribou calves be able to travel after birth?",answer:"within hours",type:"short"},
{q:"What greenhouse gas does thawing permafrost release?",answer:"methane",type:"short"}
]},
{title:"Part 1 — Travel Agency Booking",subtitle:"A customer books a holiday package with a travel agent",accent:"British English",
text:`Agent: Sunrise Holidays, this is Karen speaking.

Agent: Our most popular is the Cala d'Or resort package — fourteen nights, departing the twentieth of July from Manchester. It includes return flights, transfers, and a half-board hotel. The total for two adults and one child would be three thousand four hundred and eighty pounds.
Customer: Does the child fly at the same price as an adult?
Agent: No — children aged two to eleven receive a twenty percent discount on the full package price.
Customer: That sounds reasonable. Is travel insurance included?
Agent: It's not included but we strongly recommend our Gold Cover insurance. For your group, it would be an additional ninety-six pounds for the two weeks.
Customer: What does that cover?
Agent: Medical expenses up to ten million pounds, cancellation, luggage up to three thousand pounds, and travel delay. It's comprehensive cover.

Agent: I can hold the seats for forty-eight hours without any payment. After that, full payment is required to confirm.`,

{title:"Part 2 — School Career Talk",subtitle:"A careers advisor speaks to secondary school students",accent:"British English",
text:`Good afternoon, everyone. I'm Ms Patterson from the Careers and Guidance Department, and today I want to talk to you about something that I know many of you have on your minds — choosing what to do after Year Eleven.

You'll be making decisions about sixth form, college, or apprenticeships, and it's important to make those decisions with accurate information rather than guesswork.

Let's start with A-levels. If you choose to stay in sixth form and complete A-levels, you'll typically study three or four subjects over two years. A-levels are widely recognised by universities and provide the academic preparation for degree-level study. The average student takes three years to complete an undergraduate degree, with some four-year options available, particularly for engineering, medicine, or languages degrees with a year abroad.

Apprenticeships are a brilliant alternative that I don't think gets enough attention. You work for a company, earn a salary — the minimum is six pounds forty per hour for apprentices — and gain a recognised qualification at the same time. Higher and Degree apprenticeships, which have grown significantly in the past five years, now allow apprentices to earn the equivalent of a bachelor's or even master's degree without paying tuition fees.

I also want to mention the new T-Level qualifications, introduced in 2020. These are two-year technical qualifications equivalent to three A-levels, and they include a substantial forty-five day industry placement, giving you real work experience.

Finally, whatever route you choose, I'd encourage you to attend our three upcoming careers fairs — in November, February, and May — where you can speak directly to employers, universities, and apprenticeship providers.`,

{title:"Part 1 — Library Registration",subtitle:"A new student registers at a university library",accent:"British English",
text:`Librarian: Good morning, welcome to Riverside University Library. How can I help?

{title:"Part 2 — Cooking Class Introduction",subtitle:"A chef introduces a professional cooking class",accent:"Australian English",
text:`Welcome, everyone, to Flavours of the World Cooking Studio. My name is Chef Marco, and I'll be leading tonight's class on Italian regional cuisine.

{title:"Part 1 — Job Interview Preparation",subtitle:"A careers coach prepares a client for a job interview",accent:"British English",
text:`Coach: Right, let's get started. You've got your interview at Sterling & Partners on Thursday at two o'clock, so we have three days to prepare properly.
Client: I'm quite nervous. I haven't had a formal interview in about six years.
Coach: That's completely understandable, but nervousness is actually useful — it shows you care. The key is channelling it. First, let me ask: have you researched the company?
Client: I've looked at their website and read their last annual report. They reported revenue of two hundred and forty million pounds last year and they're planning to expand into three new markets.
Coach: Excellent. That kind of specific knowledge impresses interviewers. Now, most interviews at this level will follow a competency-based format. They'll say something like: 'Tell me about a time when you dealt with a difficult colleague.' You need to use the STAR method.
Client: What's that?
Coach: Situation, Task, Action, Result. Describe the situation briefly, explain what your task was, describe specifically what YOU did, and then — crucially — tell them the positive result. Interviewers want to hear outcomes.
Client: That makes sense. What should I wear?
Coach: For a law firm of this calibre, dress conservatively — dark navy or charcoal suit, white or light blue shirt. No strong perfume or cologne. Make sure your shoes are polished.
Client: Should I bring anything?
Coach: Bring three printed copies of your CV, a notepad and pen, and your portfolio if you have one. Arrive ten minutes early — not thirty, not five. Ten.
Client: What if I don't know the answer to something?
Coach: Say: 'That's a great question — let me think about that for a moment.' Then think. Silence is absolutely fine. Never make something up.`,

{title:"Part 2 — Environmental Talk",subtitle:"A school environmental officer talks to students about recycling",accent:"British English",
text:`Good morning, Year Ten. My name is Mr Griffiths, and I'm the Environmental Sustainability Officer for the council. Today I'm going to talk to you about something that affects every one of you directly: waste and recycling.

Let me start with some numbers. Our borough produced forty-seven thousand tonnes of household waste last year. Of that, we recycled thirty-one percent — which is actually three percent above the national average, so give yourselves a small round of applause. However, the government has set a target of sixty-five percent recycling by 2035, which means we have significant progress still to make.

The most common contamination problem we face — and contamination is when non-recyclable items are placed in recycling bins — is food waste on packaging. A pizza box covered in grease cannot be recycled. Neither can yoghurt pots that haven't been rinsed. One contaminated item can ruin an entire bin bag of otherwise recyclable material.

Glass is one of the most efficiently recycled materials we have. A glass bottle can be recycled and back on a supermarket shelf as a new bottle in as little as thirty days. By contrast, the average plastic bottle takes around four hundred and fifty years to decompose in landfill.

I'm here today because we're launching a new initiative in local schools — the Green Schools Programme. Each participating school will receive a set of clearly labelled sorting bins, and students who correctly sort waste will earn points for their school. The school with the most points at the end of term will win five hundred pounds for the school fund.

Sign-up sheets are available from your form tutors from tomorrow.`,

{title:"Part 2 — Science Museum Exhibit",subtitle:"A curator introduces a new space exploration exhibit",accent:"British English",
text:`Good afternoon and welcome to Cosmos: The Space Exploration Experience — our newest and most ambitious permanent exhibit here at the National Science Museum.

I'm Dr Claire Marsh, Chief Curator, and I've had the privilege of developing this exhibit over the past three years alongside a team of fifty specialists, including astronomers, engineers, and education experts.

Cosmos occupies the entire east wing of the museum — that's approximately four thousand square metres of gallery space — making it our largest ever exhibit. It traces the history of space exploration from the launch of Sputnik by the Soviet Union in October 1957 through to the current Mars missions and the plans for crewed lunar return.

One of our centrepiece installations is a full-scale model of the International Space Station's Columbus module — the European laboratory module, which was launched in 2008. You can step inside, see how astronauts live and conduct experiments in microgravity, and speak to a virtual astronaut powered by artificial intelligence who will answer your questions in real time.

We've also partnered with six national space agencies — including NASA, ESA, JAXA, and the UK Space Agency — who have loaned us artifacts that have actually been to space. These include a spacesuit worn during a 1995 Shuttle mission, meteorite samples from the Moon and Mars, and the communications module from a 1970s Lunar Orbiter.

Admission to Cosmos is included in the standard museum entry. We strongly recommend booking a timed entry slot online, particularly on weekends, as capacity is limited to three hundred visitors per session.`,

{q:"How long did it take to develop the Cosmos exhibit?",answer:"3 years / three years",type:"short"},

function renderSection(k){

  const grid=Array.from({length:20},(_,i)=>{

  }).join('');

  let panel='';

    if(k==='r') panel=renderReadPanel(activeIdx);
    else if(k==='w') panel=renderWritePanel(activeIdx);

  const secId={r:'reading',w:'writing',l:'listening'}[k];

  </div>

// ══════════════════════════════════════
function renderReadPanel(i){
  const ex=READING[i];
  const qHtml=ex.questions.map((q,qi)=>{
    if(q.type==='tfng'||q.type==='mcq'){
      return `<div class="qb" id="rqb_${i}_${qi}"><div class="ql"><span class="qn" style="background:var(--reading)">${qi+1}</span>${q.q}</div>
        <div class="opts">${q.options.map(o=>`<div class="opt" data-v="${o}" onclick="selRO(${i},${qi},this)">${o}</div>`).join('')}</div></div>`;
    } else {
      return `<div class="qb"><div class="ql"><span class="qn" style="background:var(--reading)">${qi+1}</span>${q.q}</div>
        <input class="ainp" id="rsa_${i}_${qi}" type="text" placeholder="Your answer…"/></div>`;
    }
  }).join('');
  return `<div class="epanel">
    <div class="ptop"><h3>Exercise ${i+1} — ${ex.title}</h3><span class="tag tag-r">Academic Reading</span></div>
    <div class="passage">${ex.text.replace(/\n\n/g,'</p><p>').replace(/^/,'<p>').replace(/$/,'</p>')}</div>
    ${qHtml}
    <div class="brow">
      <button class="btn btn-t" onclick="checkRead(${i})">Check Answers</button>
      <button class="btn btn-g" onclick="openEx('r',${i})">Reset</button>
    </div>
    <div id="rres"></div>
  </div>`;
}

function selRO(ei,qi,el){
  if(!rSel[ei]) rSel[ei]={};
  rSel[ei][qi]=el.dataset.v;
  el.closest('.opts').querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}

function checkRead(i){
  const ex=READING[i];
  let correct=0;
  ex.questions.forEach((q,qi)=>{
    const sel=(rSel[i]||{})[qi];
    const inp=document.getElementById(`rsa_${i}_${qi}`);
    const user=(sel||(inp?inp.value.toLowerCase().trim():'')).toLowerCase().trim();
    const ans=q.answer.toLowerCase().trim();
    const ok=user===ans||ans.split('/').map(a=>a.trim()).some(a=>user===a)||(user.length>2&&ans.includes(user));
    if(q.type==='tfng'||q.type==='mcq'){
      const qbEl=document.getElementById(`rqb_${i}_${qi}`)||document.querySelectorAll('#panel .qb')[qi];
      const opts=qbEl?qbEl.querySelectorAll('.opt'):[];
      opts.forEach(o=>{
        if(o.dataset.v===q.answer) o.classList.add('correct');
        if(o.classList.contains('sel')&&o.dataset.v!==q.answer) o.classList.add('wrong');
      });
    } else if(inp){
      inp.classList.add(ok?'cok':'cno');
      if(!ok) inp.placeholder='Expected: '+q.answer;
    }
    if(ok) correct++;
  });
  const pct=Math.round(correct/ex.questions.length*100);
  const band=pct>=90?9:pct>=80?8:pct>=70?7:pct>=60?6:pct>=50?5:4;
  const cls=band>=7?'good':band>=5?'mid':'low';
  document.getElementById('rres').innerHTML=`
    <div class="rbox ${cls}">
      <div style="display:flex;gap:22px;align-items:center;flex-wrap:wrap">
        <div><div class="sbig">${correct}/${ex.questions.length}</div><div class="slbl">Correct</div></div>
        <div><div class="sbig">Band ${band}</div><div class="slbl">Estimated</div></div>
      </div>
      <p style="margin-top:10px;font-size:0.83rem;color:var(--muted)">${band>=7?'🎉 Excellent! Keep it up.':band>=5?'👍 Good effort — review the missed answers.':'📚 Practise more. Re-read the passage carefully.'}</p>
    </div>`;
  if(!state.r.done.includes(i)){state.r.done.push(i);save();updateBadges();}
}

function renderWritePanel(i){
  const ex=WRITING[i];
  const tipsHtml=(ex.tips||[]).map(t=>`<div class="fb fbw">💡 ${t}</div>`).join('');
  const chartHtml=ex.chart?`<div class="passage" style="border-color:var(--amber);font-size:0.83rem;line-height:1.65;max-height:none">${ex.chart}</div>`:'';
  return `<div class="epanel">
    <div class="ptop"><h3>Exercise ${i+1} — ${ex.title}</h3><span class="tag tag-w">${ex.type}</span></div>
    <div style="padding:14px 18px;background:var(--bg);border:1px solid var(--border);border-radius:9px;margin-bottom:14px">

    </div>
    ${chartHtml}
    <div style="margin-bottom:14px">${tipsHtml}</div>
